<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFG Chapter — Build. Learn. Belong.</title>
  <meta name="description" content="GeeksforGeeks Student Chapter — The premier engineering community. Master algorithms, build real-world projects, and connect with top tech talent.">
  <meta name="theme-color" content="#0D0D1A">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Fonts: Space Grotesk (Display), DM Sans (Body), JetBrains Mono (Code) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Prevent FOUC */
    html {
      background-color: #0D0D1A;
      color: #FFFFFF;
    }
    
    /* Critical loading state */
    #root:empty::after {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      margin: 45vh auto;
      border: 2px solid rgba(0, 255, 136, 0.2);
      border-top-color: #00FF88;
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }
    
    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-background text-white">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
